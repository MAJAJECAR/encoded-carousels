<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1350px;
      background: #141414;
      overflow: hidden;
    }
    #slide-01 {
      width: 1080px;
      height: 1350px;
    }
  </style>
</head>
<body>

<div id="slide-01" style="
  width: 1080px;
  height: 1350px;
  background: #141414;
  padding: 110px 96px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
">

  <!-- Subtle corner bracket top-right -->
  <div style="position:absolute;top:0;right:0;width:130px;height:130px;border-bottom:1px solid rgba(255,255,255,0.05);border-left:1px solid rgba(255,255,255,0.05);pointer-events:none;"></div>
  <!-- Corner bracket bottom-left -->
  <div style="position:absolute;bottom:0;left:0;width:130px;height:130px;border-top:1px solid rgba(255,255,255,0.05);border-right:1px solid rgba(255,255,255,0.05);pointer-events:none;"></div>

  <!-- Brand tag -->
  <span style="
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #CCB085;
    flex-shrink: 0;
  ">Encoded.ai</span>

  <!-- Quote area — centered vertically -->
  <div style="flex: 1; display: flex; flex-direction: column; justify-content: center;">

    <!-- Decorative opening quote mark -->
    <span style="
      font-family: 'Switzer', sans-serif;
      font-size: 180px;
      font-weight: 800;
      line-height: 0.7;
      color: #2A2A2A;
      height: 96px;
      display: block;
      margin-bottom: 8px;
    ">&ldquo;</span>

    <!-- Main quote — Pillar 1 / Hook -->
    <h2 style="
      font-family: 'Switzer', sans-serif;
      font-size: 80px;
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.03em;
      color: #FFFFFF;
      margin: 0;
    ">This is witchcraft.
I don&rsquo;t know what
you guys did, but it
feels <span style="color:#CCB085;">supernatural.</span></h2>

  </div>

  <!-- Attribution -->
  <span style="
    font-family: 'Manrope', sans-serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: #898989;
    flex-shrink: 0;
  ">Blake &middot; founder</span>

</div>


  <script>
    // Required by screenshot.js — single post has only one slide
    window.goToSlide = function(index) {
      var slide = document.getElementById('slide-01');
      if (slide) {
        slide.style.display = 'flex';
      }
    };
    // Show on load
    window.goToSlide(0);
  </script>
</body>
</html>
