<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1350px; background: #141414; overflow: hidden; }
    #slide-01 { width: 1080px; height: 1350px; }
  </style>
</head>
<body>
<div id="slide-01" style="width:1080px;height:1350px;background:#141414;padding:96px;display:flex;flex-direction:column;position:relative;overflow:hidden;">

  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:60px;flex-shrink:0;">
    <span style="font-family:'Space Mono',monospace;font-size:18px;letter-spacing:0.28em;text-transform:uppercase;color:#898989;">The Shift</span>
    <span style="font-family:'Space Mono',monospace;font-size:16px;letter-spacing:0.22em;text-transform:uppercase;color:#CCB085;">Encoded.ai</span>
  </div>

  <!-- Before -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <span style="font-family:'Space Mono',monospace;font-size:16px;letter-spacing:0.22em;text-transform:uppercase;color:#898989;margin-bottom:22px;">Before</span>
    <p style="font-family:'Switzer',sans-serif;font-size:56px;font-weight:500;line-height:1.15;letter-spacing:-0.02em;color:#5A5A5A;">&ldquo;I had no idea what was gonna happen tomorrow &mdash; and I was so afraid.&rdquo;</p>
  </div>

  <!-- Divider -->
  <div style="height:1px;background:rgba(255,255,255,0.08);margin:40px 0;flex-shrink:0;"></div>

  <!-- After -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <span style="font-family:'Space Mono',monospace;font-size:16px;letter-spacing:0.22em;text-transform:uppercase;color:#CCB085;margin-bottom:22px;">After</span>
    <p style="font-family:'Switzer',sans-serif;font-size:56px;font-weight:600;line-height:1.15;letter-spacing:-0.02em;color:#FFFFFF;">&ldquo;I have no idea what&rsquo;s gonna happen tomorrow &mdash; and I&rsquo;m excited.&rdquo;</p>
  </div>

  <!-- Attribution -->
  <div style="margin-top:44px;flex-shrink:0;">
    <p style="font-family:'Space Mono',monospace;font-size:15px;letter-spacing:0.2em;text-transform:uppercase;color:#4A4A4A;margin-bottom:10px;">Captured 2 months in</p>
    <p style="font-family:'Manrope',sans-serif;font-size:26px;font-weight:400;color:#898989;">Margo Shevnin &middot; Founder, Natal Settings</p>
  </div>
</div>
  <script>
    window.goToSlide = function(index) {
      var s = document.getElementById('slide-01');
      if (s) s.style.display = 'flex';
    };
    window.goToSlide(0);
  </script>
</body>
</html>
