<title>Encoded — Tweet Template (light)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  background: #f7f9f9;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Open Sans', sans-serif;
}

.canvas {
  width: 1080px;
  height: 1350px;
  background: #f7f9f9;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tweet-card {
  width: 1080px;
  height: 1350px;
  background: #ffffff;
  border: 1px solid #eff3f4;
  box-shadow: 0 4px 40px rgba(0,0,0,0.06);
  padding: 100px 96px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ── HEADER ── */
.tweet-header {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 40px;
}

.avatar {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.account-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.account-name {
  display: flex;
  align-items: center;
  gap: 10px;
}

.name {
  font-size: 32px;
  font-weight: 700;
  color: #0f1419;
  letter-spacing: -0.01em;
}

.verified svg {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
}

.handle {
  font-size: 26px;
  font-weight: 400;
  color: #536471;
}

/* ── TWEET TEXT ── */
.tweet-text {
  font-size: 38px;
  font-weight: 400;
  line-height: 1.6;
  color: #0f1419;
  letter-spacing: -0.01em;
}
</style>
