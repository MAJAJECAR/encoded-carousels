<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:1080px; height:1350px; background:#141414; overflow:hidden; }
    #slide-01 { width:1080px; height:1350px; }
  </style>
</head>
<body>
<div id="slide-01" style="width:1080px;height:1350px;background:#141414;padding:120px 104px;display:flex;flex-direction:column;position:relative;overflow:hidden;">
  <div style="position:absolute;inset:0;background:radial-gradient(70% 46% at 50% 44%,rgba(204,176,133,0.11),rgba(204,176,133,0) 72%);pointer-events:none;"></div>

  <div style="display:flex;justify-content:center;flex-shrink:0;">
    <p style="font-family:'Space Mono',monospace;font-size:17px;letter-spacing:0.22em;text-transform:uppercase;color:#CCB085;margin-bottom:0;">Encoded Client Result</p>
  </div>

  <div style="display:flex;justify-content:center;margin-top:28px;flex-shrink:0;">
    <span style="width:44px;height:1px;background:#CCB085;display:inline-block;"></span>
  </div>

  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;">
    <p style="font-family:'Switzer',sans-serif;font-size:76px;font-weight:600;line-height:1.08;letter-spacing:-0.03em;color:#FFFFFF;max-width:840px;">&ldquo;Before Encoded I felt less confident and less clear. After Encoded, I have a lot more clarity on what I want to do.&rdquo;</p>

    <div style="display:flex;align-items:center;gap:18px;margin-top:60px;">
      <div style="width:64px;height:64px;border-radius:50%;background:#242424;border:1px solid rgba(255,255,255,0.10);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-family:'Switzer',sans-serif;font-size:21px;font-weight:600;color:#666;">KK</span></div>
      <div style="text-align:left;">
        <p style="font-family:'Space Mono',monospace;font-size:18px;letter-spacing:0.12em;color:#898989;margin-bottom:10px;">Captured 4 months into Encoded</p>
        <p style="font-family:'Manrope',sans-serif;font-size:26px;font-weight:500;color:#FFFFFF;">Kat Kirsch &middot; Founder, Published POV</p>
      </div>
    </div>
  </div>

  <div style="display:flex;justify-content:center;flex-shrink:0;">
    <span style="font-family:'Space Mono',monospace;font-size:17px;letter-spacing:0.32em;text-transform:uppercase;color:#CCB085;">Encoded.ai</span>
  </div>
</div>
  <script>
    window.goToSlide = function(i) {
      var s = document.getElementById('slide-01');
      if (s) s.style.display = 'flex';
    };
    window.goToSlide(0);
  </script>
</body>
</html>
