<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1080px;
      height: 1350px;
      background: #141414;
      overflow: hidden;
    }
    #slide-01 {
      width: 1080px;
      height: 1350px;
    }
  </style>
</head>
<body>

<div id="slide-01" style="
  width: 1080px;
  height: 1350px;
  background: #141414;
  padding: 120px 110px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
">

  <!-- Radial gold glow overlay -->
  <div style="position:absolute;inset:0;background:radial-gradient(70% 46% at 50% 44%, rgba(204,176,133,0.10), rgba(204,176,133,0) 72%);pointer-events:none;"></div>

  <!-- Eyebrow label — Mechanism pillar -->
  <div style="display:flex;justify-content:center;position:relative;flex-shrink:0;">
    <p style="
      font-family: 'Manrope', sans-serif;
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #CCB085;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    "><span style="width:24px;height:1px;background:#CCB085;display:inline-block;"></span>The Mechanism<span style="width:24px;height:1px;background:#CCB085;display:inline-block;"></span></p>
  </div>

  <!-- Quote + attribution — vertically centered -->
  <div style="
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    position: relative;
  ">
    <!-- The mechanism quote -->
    <p style="
      font-family: 'Switzer', sans-serif;
      font-size: 74px;
      font-weight: 600;
      line-height: 1.12;
      letter-spacing: -0.025em;
      color: #FFFFFF;
      margin: 0;
      max-width: 840px;
    ">My <span style="color:#CCB085;">battery</span> grows.
My capacity for feeling
and thinking is way
bigger now.</p>

    <!-- Attribution -->
    <p style="
      font-family: 'Manrope', sans-serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.06em;
      color: #898989;
      margin: 56px 0 0;
    ">Joost &middot; agency owner</p>
  </div>

  <!-- Bottom brand tag — centered -->
  <div style="display:flex;justify-content:center;position:relative;flex-shrink:0;">
    <span style="
      font-family: 'Space Mono', monospace;
      font-size: 18px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: #CCB085;
    ">Encoded.ai</span>
  </div>

</div>

</body>
</html>
