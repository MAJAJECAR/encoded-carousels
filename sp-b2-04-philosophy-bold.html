<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1080px; height: 1350px; background: #141414; overflow: hidden; }
    #slide-01 { width: 1080px; height: 1350px; }
  </style>
</head>
<body>
<div id="slide-01" style="width:1080px;height:1350px;background:#141414;padding:110px 96px;display:flex;flex-direction:column;position:relative;overflow:hidden;">
  <div style="position:absolute;top:0;right:0;width:130px;height:130px;border-bottom:1px solid rgba(255,255,255,0.05);border-left:1px solid rgba(255,255,255,0.05);pointer-events:none;"></div>

  <!-- Brand tag -->
  <span style="font-family:'Space Mono',monospace;font-size:20px;letter-spacing:0.28em;text-transform:uppercase;color:#CCB085;flex-shrink:0;">Encoded.ai</span>

  <!-- Quote centred -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <span style="font-family:'Switzer',sans-serif;font-size:180px;font-weight:800;line-height:0.7;color:#2A2A2A;height:96px;display:block;margin-bottom:12px;">&ldquo;</span>
    <h2 style="font-family:'Switzer',sans-serif;font-size:88px;font-weight:800;line-height:1.0;letter-spacing:-0.035em;color:#FFFFFF;margin:0;">No one needs<br>fixing.<br><span style="color:#CCB085;">We just need to<br>remember<br>who we are.</span></h2>
  </div>

  <!-- Attribution -->
  <div style="flex-shrink:0;">
    <p style="font-family:'Space Mono',monospace;font-size:15px;letter-spacing:0.2em;text-transform:uppercase;color:#4A4A4A;margin-bottom:10px;">Captured 3 weeks in</p>
    <p style="font-family:'Manrope',sans-serif;font-size:28px;font-weight:400;letter-spacing:0.04em;color:#898989;">Matt Wagner &middot; President, Client Focus</p>
  </div>
</div>
  <script>
    window.goToSlide = function(index) {
      var s = document.getElementById('slide-01');
      if (s) s.style.display = 'flex';
    };
    window.goToSlide(0);
  </script>
</body>
</html>
