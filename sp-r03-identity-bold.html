<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:1080px; height:1350px; background:#141414; overflow:hidden; }
    #slide-01 { width:1080px; height:1350px; }
  </style>
</head>
<body>
<div id="slide-01" style="width:1080px;height:1350px;background:#141414;padding:110px 96px;display:flex;flex-direction:column;position:relative;overflow:hidden;">
  <div style="position:absolute;top:0;right:0;width:130px;height:130px;border-bottom:1px solid rgba(255,255,255,0.05);border-left:1px solid rgba(255,255,255,0.05);pointer-events:none;"></div>

  <!-- Label + context -->
  <div style="flex-shrink:0;">
    <p style="font-family:'Space Mono',monospace;font-size:17px;letter-spacing:0.22em;text-transform:uppercase;color:#CCB085;margin-bottom:0;">6 Weeks into Encoded</p>
    <p style="font-family:'Manrope',sans-serif;font-size:28px;font-weight:400;color:#898989;line-height:1.4;margin-top:16px;">A founder on the shift from performing to presence.</p>
  </div>

  <!-- Quote — dominant -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <span style="font-family:'Switzer',sans-serif;font-size:180px;font-weight:800;line-height:0.7;color:#2A2A2A;height:96px;display:block;margin-bottom:12px;">&ldquo;</span>
    <h2 style="font-family:'Switzer',sans-serif;font-size:130px;font-weight:800;line-height:0.97;letter-spacing:-0.04em;color:#FFFFFF;">I started<br>just being,<br>rather than<br>trying to be.</h2>
  </div>

  <!-- Attribution -->
  <div style="display:flex;align-items:center;gap:18px;margin-top:44px;">
    <div style="width:64px;height:64px;border-radius:50%;background:#242424;border:1px solid rgba(255,255,255,0.10);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-family:'Switzer',sans-serif;font-size:21px;font-weight:600;color:#666;">JS</span></div>
    <div>
      <p style="font-family:'Space Mono',monospace;font-size:18px;letter-spacing:0.12em;color:#898989;margin-bottom:10px;">Captured 6 weeks into Encoded</p>
      <p style="font-family:'Manrope',sans-serif;font-size:26px;font-weight:500;color:#FFFFFF;">Jarod Smith &middot; CEO, RiskX Insurance</p>
    </div>
  </div>

</div>
  <script>
    window.goToSlide = function(i) {
      var s = document.getElementById('slide-01');
      if (s) s.style.display = 'flex';
    };
    window.goToSlide(0);
  </script>
</body>
</html>
