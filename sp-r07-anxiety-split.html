<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1080">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@400,500,600,700,800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body { width:1080px; height:1350px; background:#141414; overflow:hidden; }
    #slide-01 { width:1080px; height:1350px; }
  </style>
</head>
<body>
<div id="slide-01" style="width:1080px;height:1350px;background:#141414;padding:90px;display:flex;flex-direction:column;position:relative;overflow:hidden;">

  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:52px;flex-shrink:0;">
    <span style="font-family:'Space Mono',monospace;font-size:18px;letter-spacing:0.26em;text-transform:uppercase;color:#FFFFFF;">The Encoded Shift</span>
    <span style="font-family:'Space Mono',monospace;font-size:16px;letter-spacing:0.2em;text-transform:uppercase;color:#CCB085;">Encoded.ai</span>
  </div>

  <!-- Before panel — editorial description, NO quote marks -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <span style="font-family:'Space Mono',monospace;font-size:15px;letter-spacing:0.22em;text-transform:uppercase;color:#898989;margin-bottom:22px;">Before Encoded</span>
    <p style="font-family:'Switzer',sans-serif;font-size:52px;font-weight:400;line-height:1.18;letter-spacing:-0.02em;color:#4A4A4A;">When morning anxiety hit and the mind just wouldn&rsquo;t stop running.</p>
  </div>

  <!-- Divider -->
  <div style="height:1px;background:rgba(255,255,255,0.08);margin:32px 0;flex-shrink:0;"></div>

  <!-- After panel — real verbatim quote, WITH quote marks -->
  <div style="flex:1;display:flex;flex-direction:column;justify-content:center;">
    <span style="font-family:'Space Mono',monospace;font-size:15px;letter-spacing:0.22em;text-transform:uppercase;color:#CCB085;margin-bottom:22px;">After 3 weeks into Encoded</span>
    <p style="font-family:'Switzer',sans-serif;font-size:52px;font-weight:600;line-height:1.18;letter-spacing:-0.02em;color:#FFFFFF;">&ldquo;I did the writing exercise. 25 minutes later it was gone. I had a great day.&rdquo;</p>
  </div>

  <!-- Attribution -->
  <div style="display:flex;align-items:center;gap:18px;margin-top:44px;">
    <div style="width:64px;height:64px;border-radius:50%;background:#242424;border:1px solid rgba(255,255,255,0.10);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><span style="font-family:'Switzer',sans-serif;font-size:21px;font-weight:600;color:#666;">MW</span></div>
    <div>
      <p style="font-family:'Space Mono',monospace;font-size:18px;letter-spacing:0.12em;color:#898989;margin-bottom:10px;">Captured 3 weeks into Encoded</p>
      <p style="font-family:'Manrope',sans-serif;font-size:26px;font-weight:500;color:#FFFFFF;">Matt Wagner &middot; President, Client Focus</p>
    </div>
  </div>

</div>
  <script>
    window.goToSlide = function(i) {
      var s = document.getElementById('slide-01');
      if (s) s.style.display = 'flex';
    };
    window.goToSlide(0);
  </script>
</body>
</html>
