<title>Courtney Confare — Tweet Template (dark)</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1080px;
  height: 1350px;
  overflow: hidden;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Open Sans', sans-serif;
}

.canvas {
  width: 1080px;
  height: 1350px;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.tweet-card {
  width: 1080px;
  height: 1350px;
  background: #16181c;
  border: 1px solid #2f3336;
  
  padding: 100px 96px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.tweet-header {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 40px;
}

.avatar {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}

.account-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.account-name {
  display: flex;
  align-items: center;
  gap: 10px;
}

.name {
  font-size: 32px;
  font-weight: 700;
  color: #e7e9ea;
  letter-spacing: -0.01em;
}

.verified svg {
  width: 30px;
  height: 30px;
  flex-shrink: 0;
}

.handle {
  font-size: 26px;
  font-weight: 400;
  color: #71767b;
}

.tweet-text {
  font-size: 38px;
  font-weight: 400;
  line-height: 1.6;
  color: #e7e9ea;
  letter-spacing: -0.01em;
}
</style>
